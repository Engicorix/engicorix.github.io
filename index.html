<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엔지코릭스 Core Competencies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#f4f7fb;color:#1a2030;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e4e8f0;padding:20px 24px 14px;display:flex;flex-direction:column;align-items:center;gap:9px}
.header-logo{height:42px;width:auto;display:block}
header p{font-size:12.5px;color:#7a8898;line-height:1.6;max-width:580px;text-align:center}
header p strong{color:#148860;font-weight:700}
.filter-row{display:flex;justify-content:center;gap:10px;padding:11px 24px;background:#fff;border-bottom:1px solid #e4e8f0;flex-wrap:wrap}
.ftab{padding:6px 16px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #d0d8e8;color:#7a8898;background:#fff;transition:all .18s}
.ftab.f-all.active{background:#0d1a2e;border-color:#0d1a2e;color:#fff}
.ftab.f-om.active{background:#148860;border-color:#148860;color:#fff}
.ftab.f-epc.active{background:#b86810;border-color:#b86810;color:#fff}
.ftab.f-dt.active{background:#5828b8;border-color:#5828b8;color:#fff}
.map-wrap{max-width:940px;margin:0 auto;padding:8px 8px 0}
svg#techmap{display:block;width:100%;height:auto;overflow:visible}
.hx polygon{transition:filter .15s}.hx:hover polygon{filter:brightness(.87) saturate(1.2)}
.common-wrap{max-width:940px;margin:0 auto;padding:8px 20px 24px}
.common-wrap h3{font-size:10.5px;color:#8a9aaa;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:999px;font-size:11.5px;background:#fff;border:1px solid #d8e4f0;color:#5a6a7a;font-weight:500}
.legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;padding:11px 24px;border-top:1px solid #e4e8f0;background:#fff}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#7a8898}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
footer{text-align:center;padding:12px;font-size:10px;color:#bbc4cc;border-top:1px solid #e8edf4;background:#fff;letter-spacing:.06em}
.tip-overlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(10,20,40,.45);padding:20px}
.tip-overlay.show{display:flex}
.tip-card{background:#fff;border-radius:18px;border:1px solid #d8e4f0;box-shadow:0 8px 40px rgba(0,0,0,.14);padding:24px 26px 20px;max-width:430px;width:100%;position:relative;animation:popIn .15s ease}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.tip-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;color:#aab;cursor:pointer;padding:4px}
.tip-close:hover{color:#445}
.tip-pillar{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.tip-title{font-size:17px;font-weight:800;color:#0d1a2e;margin-bottom:7px;line-height:1.3}
.tip-desc{font-size:12.5px;color:#5a6a7a;line-height:1.72;margin-bottom:11px}
.tip-pts{list-style:none;padding:0}
.tip-pts li{font-size:12px;color:#3a4a5a;padding:5px 0 5px 15px;position:relative;border-bottom:1px solid #f0f4f8;line-height:1.5}
.tip-pts li::before{content:'';position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%}
.tip-pts.om li::before{background:#148860}
.tip-pts.epc li::before{background:#b86810}
.tip-pts.dt li::before{background:#5828b8}
</style>
</head>

<script>
const PM={om:{label:'보전 / O&M — Operation & Maintenance',color:'#148860'},epc:{label:'EPC — Engineering · Procurement · Construction',color:'#b86810'},dt:{label:'Deep-Tech — R&D · Innovation · Platform',color:'#5828b8'}};
function showTip(p,t,desc,pts){
  document.getElementById('ttPillar').textContent=PM[p].label;
  document.getElementById('ttPillar').style.color=PM[p].color;
  document.getElementById('ttTitle').textContent=t;
  document.getElementById('ttDesc').textContent=desc;
  const ul=document.getElementById('ttPts');ul.className='tip-pts '+p;
  ul.innerHTML=pts.map(x=>'<li>'+x+'</li>').join('');
  document.getElementById('tipOverlay').classList.add('show');
}
function hideTip(){document.getElementById('tipOverlay').classList.remove('show');}
function closeTipOut(e){if(e.target===document.getElementById('tipOverlay'))hideTip();}
function filterPillar(p){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.ftab.f-'+p).classList.add('active');
  document.querySelectorAll('.bubble-g,.pillar-g').forEach(g=>{
    const show=p==='all'||g.dataset.pillar===p;
    g.style.opacity=show?'1':'0.1';g.style.pointerEvents=show?'auto':'none';
  });
}
</script>
